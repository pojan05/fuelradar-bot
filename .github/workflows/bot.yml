name: Auto Run Bot
on:
  schedule:
    # รันเวลา 07:00, 11:00, และ 17:00 (เวลาไทย)
    - cron: '0 0,4,10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 selenium webdriver-manager pytz google-genai earthengine-api
        
      - name: Run Fuel & Info Bot
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_TOKEN_2: ${{ secrets.LINE_TOKEN_2 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EE_JSON_KEY: ${{ secrets.EE_JSON_KEY }}
          TOMORROW_API_KEY: ${{ secrets.TOMORROW_API_KEY }}
        run: python main.py
        
      - name: Update Data File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f data.json ]; then
            git add data.json
            git commit -m "chore: update fuel data [skip ci]" || echo "No changes to commit"
            git push
          fi
