name: Auto Run Bot
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Tools
        run: |
          pip install requests beautifulsoup4 selenium webdriver-manager selenium-wire blinker==1.7.0
        
      - name: Run Python Code
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_TO_ID: ${{ secrets.LINE_TO_ID }}
        run: python main.py
        
      - name: Save Data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          touch data.json
          git add data.json
          git commit -m "update data" || echo "No changes"
          git push
