name: Auto Run Bot
on:
  schedule:
    # รันทุก 10 นาที เฉพาะช่วงเวลา 05:00 - 21:59 น. เวลาไทย (UTC 22-23 และ 0-14)
    - cron: '*/10 0-14,22-23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Tools
        run: |
          # ติดตั้งเครื่องมือพื้นฐานและ pytz สำหรับจัดการเวลาไทย
          pip install requests beautifulsoup4 selenium webdriver-manager pytz
        
      - name: Run Python Code
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_TO_ID: ${{ secrets.LINE_TO_ID }}
          # --- เพิ่ม 2 บรรทัดนี้สำหรับบอทตัวที่สอง ---
          LINE_TOKEN_2: ${{ secrets.LINE_TOKEN_2 }}
          LINE_TO_ID_2: ${{ secrets.LINE_TO_ID_2 }}
        run: python main.py
        
      - name: Save Data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          touch data.json
          git add data.json
          git commit -m "update data" || echo "No changes"
          git push
