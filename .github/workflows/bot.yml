name: Auto Run Bot
on:
  schedule:
    # รันเวลา 23:00 UTC (06:00 ไทย) และ 10:00 UTC (17:00 ไทย)
    - cron: '0 23,10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        # เพิ่ม google-genai และ earthengine-api สำหรับดึงข้อมูลมาแจ้งใน LINE
        run: |
          pip install requests beautifulsoup4 selenium webdriver-manager pytz google-genai earthengine-api
        
      - name: Run Fuel & Info Bot
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_TOKEN_2: ${{ secrets.LINE_TOKEN_2 }}
          # เพิ่มตัวแปรสำหรับระบบวิเคราะห์ (ต้องไปใส่ใน Secrets ของโปรเจกต์นี้ด้วย)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EE_JSON_KEY: ${{ secrets.EE_JSON_KEY }}
          TOMORROW_API_KEY: ${{ secrets.TOMORROW_API_KEY }}
        run: python main.py
        
      - name: Update Data File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f data.json ]; then
            git add data.json
            git commit -m "chore: update fuel data [skip ci]" || echo "No changes to commit"
            git push
          fi
